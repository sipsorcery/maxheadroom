# One benchmark workflow, two complementary measurement methods. The HTTP suite
# measures deterministic server/API stages; the WebRTC suite drives a real
# headless Chrome viewer. A final single-writer job publishes both to bench-data.
name: bench

on:
  workflow_dispatch:
    inputs:
      target:
        description: Base URL measured by both the HTTP/API and browser/WebRTC suites
        default: https://max-claude.sipsorcery.com
      iterations:
        description: Number of HTTP /ask prompts
        default: "5"
      webrtc_iterations:
        description: Number of deterministic WebRTC speech transitions
        default: "3"
      deployment:
        description: Optional experiment label (defaults to the target's reported branch)
        default: ""
        type: string
      webrtc_llm_model:
        description: LLM model name configured on the target
        default: mistral-3-14B
        type: string
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

# A run resets /bench state and the publisher writes one shared data branch.
concurrency:
  group: bench
  cancel-in-progress: false

jobs:
  http:
    name: HTTP/API suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Cache STT corpus
        uses: actions/cache@v4
        with:
          path: bench/cache
          key: bench-corpus-${{ hashFiles('bench/corpus.json') }}
      - name: Run HTTP/API benchmark
        run: |
          TARGET="${{ github.event.inputs.target || 'https://max-claude.sipsorcery.com' }}"
          ITERATIONS="${{ github.event.inputs.iterations || '5' }}"
          VERSION="$(curl --fail --silent --show-error "$TARGET/version")"
          DEPLOYED_SHA="$(node -e 'console.log(JSON.parse(process.argv[1]).sha || "unknown")' "$VERSION")"
          DETECTED_BRANCH="$(node -e 'console.log(JSON.parse(process.argv[1]).branch || "unknown")' "$VERSION")"
          DEPLOYMENT="${{ github.event.inputs.deployment }}"
          DEPLOYMENT="${DEPLOYMENT:-$DETECTED_BRANCH}"
          LABEL="${DEPLOYMENT}-${DEPLOYED_SHA:0:8}"
          dotnet run --project src/MaxBench -c Release -- all \
            --target "$TARGET" --iterations "$ITERATIONS" --json bench-results.json \
            --label "$LABEL" | tee bench-summary.md
          cat bench-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload HTTP/API results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-bench-results-${{ github.run_id }}
          path: |
            bench-results.json
            bench-summary.md
          if-no-files-found: ignore

  webrtc:
    name: Browser WebRTC suite
    needs: http
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: benchmarks/webrtc/package.json
      - name: Install browser benchmark dependencies
        working-directory: benchmarks/webrtc
        # Chrome is supplied by the runner; avoid downloading Playwright's
        # bundled Chromium, which cannot decode Max's H264 stream everywhere.
        run: npm install --ignore-scripts
      - name: Install audio preparation tool
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
      - name: Prepare deterministic prompt audio
        run: |
          mkdir -p bench-webrtc
          curl --fail --location --retry 3 \
            https://www.voiptroubleshooter.com/open_speech/american/OSR_us_000_0010_8k.wav \
            -o bench-webrtc/source.wav
          # First Harvard sentence plus 800ms of silence. The runner reports its
          # prompt-end boundary before the trailing silence.
          ffmpeg -hide_banner -loglevel error -y -i bench-webrtc/source.wav -t 3.05 \
            -af "apad=pad_dur=0.8" -t 3.85 -ar 48000 -ac 1 bench-webrtc/prompt.wav
      - name: Run deterministic browser/WebRTC transitions
        run: |
          TARGET="${{ github.event.inputs.target || 'https://max-claude.sipsorcery.com' }}"
          ITERATIONS="${{ github.event.inputs.webrtc_iterations || '3' }}"
          mkdir -p bench-webrtc/runs
          curl --fail --silent --show-error "$TARGET/version" > bench-webrtc/version.json
          DETECTED_BRANCH="$(node -e 'console.log(JSON.parse(require("fs").readFileSync("bench-webrtc/version.json")).branch || "unknown")')"
          DEPLOYED_SHA="$(node -e 'console.log(JSON.parse(require("fs").readFileSync("bench-webrtc/version.json")).sha || process.env.GITHUB_SHA)' )"
          DEPLOYMENT="${{ github.event.inputs.deployment }}"
          DEPLOYMENT="${DEPLOYMENT:-$DETECTED_BRANCH}"
          INPUTS=()
          for i in $(seq 1 "$ITERATIONS"); do
            node benchmarks/webrtc/run.mjs --url "$TARGET" --audio bench-webrtc/prompt.wav \
              --out "bench-webrtc/runs/$i.json" --recording "bench-webrtc/diagnostic-$i.webm" \
              --commit-sha "$DEPLOYED_SHA"
            INPUTS+=(--input "bench-webrtc/runs/$i.json")
          done
          node benchmarks/webrtc/report.mjs \
            "${INPUTS[@]}" \
            --run-out bench-webrtc/webrtc-result.json --history-dir bench-webrtc/generated-history \
            --run-id "webrtc-${GITHUB_RUN_ID}" --commit-sha "$DEPLOYED_SHA" \
            --target "$TARGET" --deployment "$DEPLOYMENT" \
            --runner github-actions-ubuntu \
            --llm-model "${{ github.event.inputs.webrtc_llm_model || 'mistral-3-14B' }}"
      - name: Upload browser/WebRTC results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webrtc-bench-results-${{ github.run_id }}
          path: bench-webrtc/
          if-no-files-found: ignore

  publish:
    name: Publish unified bench history
    needs: [http, webrtc]
    if: ${{ needs.http.result == 'success' && needs.webrtc.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/download-artifact@v4
        with:
          name: http-bench-results-${{ github.run_id }}
          path: artifacts/http
      - uses: actions/download-artifact@v4
        with:
          name: webrtc-bench-results-${{ github.run_id }}
          path: artifacts/webrtc
      - name: Append both suites to bench-data
        run: |
          git config user.name "bench-bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin bench-data
          git worktree add ../bench-data origin/bench-data
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          HTTP_LABEL="$(node -e 'const r=JSON.parse(require("fs").readFileSync("artifacts/http/bench-results.json")); console.log((r.label || "unknown").replace(/[^A-Za-z0-9._-]/g, "-"))')"
          WEBRTC_SHA="$(node -e 'console.log(JSON.parse(require("fs").readFileSync("artifacts/webrtc/webrtc-result.json")).source.commitSha.slice(0, 8))')"
          cp artifacts/http/bench-results.json "../bench-data/runs/${STAMP}-http-${HTTP_LABEL}.json"
          cp artifacts/webrtc/webrtc-result.json "../bench-data/runs/${STAMP}-webrtc-${WEBRTC_SHA}.json"
          for seed in benchmarks/webrtc/history-seed/*.json; do
            destination="../bench-data/runs/webrtc-$(basename "$seed")"
            test -f "$destination" || cp "$seed" "$destination"
          done
          test -f ../bench-data/README.md || cp benchmarks/webrtc/bench-data-README.md ../bench-data/README.md
          dotnet run --project src/MaxBench -c Release -- history --history-dir ../bench-data
          cd ../bench-data
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "bench: ${STAMP} (${GITHUB_SHA::8})"
            git push origin HEAD:bench-data
          fi
