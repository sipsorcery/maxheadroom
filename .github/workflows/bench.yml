# Benchmark control plane. Scheduled workflows must be defined on the default
# branch; the reusable implementation and all generated history stay separate.
name: bench

on:
  workflow_dispatch:
    inputs:
      target:
        description: Base URL of the HTTP/API bench instance
        default: https://max-claude.sipsorcery.com
        type: string
      iterations:
        description: Number of HTTP /ask prompts
        default: "5"
        type: string
      webrtc_target:
        description: Base URL of the browser/WebRTC bench instance
        default: https://max-codex.sipsorcery.com
        type: string
      webrtc_iterations:
        description: Number of deterministic WebRTC speech transitions
        default: "3"
        type: string
      webrtc_llm_model:
        description: LLM model name configured on the WebRTC target
        default: mistral-3-14B
        type: string
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: bench
  cancel-in-progress: false

jobs:
  run:
    uses: sipsorcery/maxheadroom/.github/workflows/bench.yml@claude/maxheadroom
    with:
      target: ${{ inputs.target || 'https://max-claude.sipsorcery.com' }}
      iterations: ${{ inputs.iterations || '5' }}
      webrtc_target: ${{ inputs.webrtc_target || 'https://max-codex.sipsorcery.com' }}
      webrtc_iterations: ${{ inputs.webrtc_iterations || '3' }}
      webrtc_llm_model: ${{ inputs.webrtc_llm_model || 'mistral-3-14B' }}
