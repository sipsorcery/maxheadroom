# Builds and publishes the Max Docker image either from an explicit manual ref or
# automatically when a docker/staging/<version> Git tag is pushed. "staging" is
# the build trigger; the published artifact is environment-neutral and is later
# promoted to production without rebuilding it.
#
# Tag examples:
#   git tag -a docker/staging/0.0.13 origin/staging -m "Max 0.0.13 candidate"
#   git push origin docker/staging/0.0.13
#
# Manual example:
#   gh workflow run build-image --repo sipsorcery/maxheadroom \
#     -f branch=feature/test \
#     -f image=registry.digitalocean.com/sipsorcery-demo/webrtc-max-headroom:test-<sha>
name: build-image

on:
  push:
    tags:
      - "docker/staging/*"
  workflow_dispatch:
    inputs:
      branch:
        description: Branch (or ref) to build the image from
        required: true
      image:
        description: Full image reference to tag and push, e.g. registry.digitalocean.com/sipsorcery-demo/webrtc-max-headroom:test-<sha>
        required: true
      description:
        description: BUILD_DESCRIPTION shown on the /version endpoint and web page badge
        required: false
        default: ""

permissions:
  contents: read

env:
  IMAGE_NAME: webrtc-max-headroom

concurrency:
  group: build-image-${{ github.event_name == 'push' && github.ref || inputs.image }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # A tag push builds exactly the tagged commit. Manual runs retain the
          # existing ability to build any branch, tag or commit SHA.
          ref: ${{ github.event_name == 'push' && github.ref || inputs.branch }}

      - name: Resolve build settings
        id: settings
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ github.ref_name }}
          MANUAL_REF: ${{ inputs.branch }}
          MANUAL_IMAGE: ${{ inputs.image }}
          MANUAL_DESCRIPTION: ${{ inputs.description }}
          REGISTRY_REPOSITORY: ${{ secrets.DIGITAL_OCEAN_CONTAINER_REGISTRY_URL }}
        run: |
          set -euo pipefail

          full_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=8 HEAD)"
          registry_repository="${REGISTRY_REPOSITORY%/}"
          registry_repository="${registry_repository#https://}"
          registry_repository="${registry_repository#http://}"
          if [[ "$registry_repository" == "registry.digitalocean.com" ]]; then
            registry_repository="$registry_repository/sipsorcery-demo"
          fi
          if [[ "$registry_repository" != "registry.digitalocean.com/sipsorcery-demo" ]]; then
            echo "::error::DIGITAL_OCEAN_CONTAINER_REGISTRY_URL must identify registry.digitalocean.com/sipsorcery-demo."
            exit 1
          fi
          registry_host="${registry_repository%%/*}"
          image_repository="$registry_repository/$IMAGE_NAME"

          if [[ "$EVENT_NAME" == "push" ]]; then
            if [[ ! "$TAG_NAME" =~ ^docker/staging/([A-Za-z0-9][A-Za-z0-9._-]{0,63})$ ]]; then
              echo "::error::Expected tag docker/staging/<version>; got '$TAG_NAME'."
              exit 1
            fi

            channel="staging"
            version="${BASH_REMATCH[1]}"
            source_ref="staging"
            display_ref="$TAG_NAME"
            description="Git tag $TAG_NAME"
            image_tags=(
              "$image_repository:$version"
              "$image_repository:sha-$short_sha"
            )
            primary_image="$image_repository:$version"
            promotion_target="staging"
          else
            channel=""
            source_ref="$MANUAL_REF"
            display_ref="$MANUAL_REF"
            version="$short_sha"
            description="${MANUAL_DESCRIPTION//$'\r'/ }"
            description="${description//$'\n'/ }"
            image_tags=("$MANUAL_IMAGE")
            primary_image="$MANUAL_IMAGE"
            promotion_target=""
          fi

          {
            echo "full_sha=$full_sha"
            echo "short_sha=$short_sha"
            echo "channel=$channel"
            echo "source_ref=$source_ref"
            echo "display_ref=$display_ref"
            echo "version=$version"
            echo "description=$description"
            echo "registry_host=$registry_host"
            echo "primary_image=$primary_image"
            echo "promotion_target=$promotion_target"
            echo "tags<<EOF"
            printf '%s\n' "${image_tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ steps.settings.outputs.registry_host }}
          username: ${{ secrets.DIGITAL_OCEAN_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.DIGITAL_OCEAN_CONTAINER_REGISTRY_PASSWORD }}

      - name: Reject reused version
        if: github.event_name == 'push'
        shell: bash
        env:
          IMAGE: ${{ steps.settings.outputs.primary_image }}
        run: |
          set -euo pipefail
          if docker buildx imagetools inspect "$IMAGE" >/dev/null 2>&1; then
            echo "::error::Versioned image $IMAGE already exists. Build tags and versions are immutable; use a new version."
            exit 1
          fi

      - name: Build and push
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Max/Dockerfile
          push: true
          tags: ${{ steps.settings.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.settings.outputs.full_sha }}
            org.opencontainers.image.version=${{ steps.settings.outputs.version }}
            org.opencontainers.image.ref.name=${{ steps.settings.outputs.display_ref }}
          build-args: |
            GIT_BRANCH=${{ steps.settings.outputs.source_ref }}
            GIT_SHA=${{ steps.settings.outputs.short_sha }}
            BUILD_DESCRIPTION=${{ steps.settings.outputs.description }}

      - name: Propose deployment
        id: promotion
        if: steps.settings.outputs.promotion_target != ''
        shell: bash
        env:
          DOCONFIGSYNC_TOKEN: ${{ secrets.DOCONFIGSYNC_DISPATCH_TOKEN }}
          PROMOTION_TARGET: ${{ steps.settings.outputs.promotion_target }}
          IMAGE: ${{ steps.settings.outputs.primary_image }}
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          SOURCE_TAG: ${{ steps.settings.outputs.display_ref }}
          SOURCE_SHA: ${{ steps.settings.outputs.full_sha }}
          BUILD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [[ -z "$DOCONFIGSYNC_TOKEN" ]]; then
            echo "::warning::DOCONFIGSYNC_DISPATCH_TOKEN is not configured; deployment proposal skipped."
            echo "status=skipped (missing DOCONFIGSYNC_DISPATCH_TOKEN)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          event_type="max-${PROMOTION_TARGET}-image-ready"
          jq -n \
            --arg event_type "$event_type" \
            --arg image "$IMAGE" \
            --arg digest "$IMAGE_DIGEST" \
            --arg source_tag "$SOURCE_TAG" \
            --arg source_sha "$SOURCE_SHA" \
            --arg build_run_url "$BUILD_RUN_URL" \
            '{
              event_type: $event_type,
              client_payload: {
                image: $image,
                digest: $digest,
                source_tag: $source_tag,
                source_sha: $source_sha,
                build_run_url: $build_run_url
              }
            }' |
            GH_TOKEN="$DOCONFIGSYNC_TOKEN" gh api \
              --method POST \
              repos/sipsorcery/doconfigsync/dispatches \
              --input -

          echo "status=$PROMOTION_TARGET proposal dispatched to sipsorcery/doconfigsync" >> "$GITHUB_OUTPUT"

      - name: Summary
        env:
          IMAGE_TAGS: ${{ steps.settings.outputs.tags }}
          SOURCE_REF: ${{ steps.settings.outputs.display_ref }}
          SHORT_SHA: ${{ steps.settings.outputs.short_sha }}
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          PROMOTION_STATUS: ${{ steps.promotion.outputs.status }}
        run: |
          {
            echo "Built and pushed:"
            while IFS= read -r image; do
              echo "- \`$image\`"
            done <<< "$IMAGE_TAGS"
            echo
            echo "Source: \`$SOURCE_REF\` @ \`$SHORT_SHA\`"
            echo
            echo "Digest: \`$IMAGE_DIGEST\`"
            if [[ -n "$PROMOTION_STATUS" ]]; then
              echo
              echo "Deployment proposal: $PROMOTION_STATUS"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
