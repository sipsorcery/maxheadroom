# Manually-triggered Docker image build, callable by any collaborator/agent working
# on this repo (each agent builds/deploys from its own branch and namespace - see
# AGENTS.md - so this lives on master rather than any one agent's branch).
#
# Usage: gh workflow run build-image --repo sipsorcery/maxheadroom \
#          -f branch=claude/maxheadroom -f image=sipsorcery/webrtc-max-headroom:claude-<sha>
name: build-image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch (or ref) to build the image from
        required: true
      image:
        description: Full image reference to tag and push, e.g. sipsorcery/webrtc-max-headroom:claude-<sha>
        required: true
      description:
        description: BUILD_DESCRIPTION shown on the /version endpoint and web page badge
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Resolve short commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Max/Dockerfile
          push: true
          tags: ${{ inputs.image }}
          build-args: |
            GIT_BRANCH=${{ inputs.branch }}
            GIT_SHA=${{ steps.sha.outputs.short }}
            BUILD_DESCRIPTION=${{ inputs.description }}

      - name: Summary
        run: |
          echo "Built and pushed \`${{ inputs.image }}\` from \`${{ inputs.branch }}\` @ \`${{ steps.sha.outputs.short }}\`." >> "$GITHUB_STEP_SUMMARY"
