name: CI

on:
  pull_request:
    branches:
      - master
      - codex/development
  push:
    branches:
      - master
      - codex/development
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/Max.slnx

      - name: Build
        run: dotnet build src/Max.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test src/Max.slnx --configuration Release --no-build --logger "console;verbosity=normal"

      - name: Test browser benchmark analysis
        working-directory: benchmarks/webrtc
        run: node --test
